services:
  node1:
    build: .
    container_name: feature-store-node1
    environment:
      NODE_ID: node1
      PORT: "8080"
      LEADER: "true"
      PEERS: "node2:8080,node3:8080"
    ports:
      - "8081:8080"
    volumes:
      - node1-data:/app/data
    networks:
      - feature-store-net

  node2:
    build: .
    container_name: feature-store-node2
    environment:
      NODE_ID: node2
      PORT: "8080"
      LEADER: "false"
      PEERS: ""
    ports:
      - "8082:8080"
    volumes:
      - node2-data:/app/data
    networks:
      - feature-store-net
    depends_on:
      - node1

  node3:
    build: .
    container_name: feature-store-node3
    environment:
      NODE_ID: node3
      PORT: "8080"
      LEADER: "false"
      PEERS: ""
    ports:
      - "8083:8080"
    volumes:
      - node3-data:/app/data
    networks:
      - feature-store-net
    depends_on:
      - node1

networks:
  feature-store-net:
    driver: bridge

volumes:
  node1-data:
  node2-data:
  node3-data: